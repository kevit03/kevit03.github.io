<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kevin Tang</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <div class="site-title">Kevin Tang</div>

    <nav class="tabs">
      <button class="tab is-active" data-tab="projects">Projects</button>
      <button class="tab" data-tab="gallery">Gallery</button>
      <button class="tab" data-tab="contact">Contact</button>
    </nav>
  </div>
</header>

<main>

<section id="projects" class="tab-panel is-active">
  <div class="container narrow">
    <h1 class="section-title">Selected Work</h1>

    <div class="project-controls">
      <button id="openProjectModal" class="text-button">Add Project</button>
    </div>

    <div id="projectGrid" class="project-list"></div>
  </div>
</section>

<section id="gallery" class="tab-panel">
  <div class="container wide">
    <h1 class="section-title">Photo Archive</h1>

    <div class="gallery-controls">
      <label class="text-button">
        Upload JPEG
        <input id="imagePicker" type="file" accept="image/jpeg" multiple hidden>
      </label>
    </div>

    <div id="galleryGrid" class="gallery-grid"></div>
  </div>
</section>

<section id="contact" class="tab-panel">
  <div class="container narrow">
    <h1 class="section-title">Contact</h1>

    <div class="contact-list">
      <a href="mailto:tk032606@gmail.com">Email</a>
      <a href="https://github.com/kevit03" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/kevin-tang1/" target="_blank">LinkedIn</a>
    </div>
  </div>
</section>

</main>

<script src="./app.js" defer></script>

<script>
document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b =>
      b.classList.toggle("is-active", b === btn)
    );
    document.querySelectorAll(".tab-panel").forEach(panel =>
      panel.classList.toggle("is-active", panel.id === btn.dataset.tab)
    );
  });
});
</script>

</body>
</html>
