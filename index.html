<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kevin Tang</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./styles.css" />
</head>

<body>

<header class="site-header">
  <div class="site-container header-inner">
    <div class="site-logo">Kevin Tang</div>

    <nav class="site-nav">
      <button class="nav-link is-active" data-tab="projects">Work</button>
      <button class="nav-link" data-tab="gallery">Photography</button>
      <button class="nav-link" data-tab="contact">Contact</button>
    </nav>
  </div>
</header>

<main>

<section id="projects" class="tab-panel is-active">
  <div class="site-container">
    <div class="intro">
      <h1>Selected Work</h1>
      <p>Computer Science / Data Science </p>
      <p>Sophomore at NYU CAS (Class of 2028) </p>
    </div>

    <div id="projectGrid" class="project-grid"></div>
    
  </div>
</section>

<section id="gallery" class="tab-panel">
  <div class="site-container wide">

    <div class="intro">
      <h1>Photography</h1>
      <p>Personal visual archive.</p>
    </div>

    <div class="gallery-wrapper">

      <div class="gallery-stage">
        <img id="galleryImage" class="gallery-image" />
        <div class="gallery-overlay">
          <div class="gallery-meta">
            <div id="galleryTitle" class="gallery-title"></div>
            <div id="galleryCaption" class="gallery-caption"></div>
          </div>
        </div>

        <div class="gallery-nav gallery-prev" id="galleryPrev">&#8592;</div>
        <div class="gallery-nav gallery-next" id="galleryNext">&#8594;</div>
      </div>

      <div class="gallery-blog">
        <button id="toggleBlog" class="blog-toggle">Read Notes</button>
        <div id="galleryBlogText" class="blog-text"></div>
      </div>

    </div>

  </div>
</section>

<section id="contact" class="tab-panel">
  <div class="site-container narrow">
    <div class="intro">
      <h1>Contact</h1>
    </div>

    <div class="contact-links">
      <a href="mailto:tk032606@gmail.com">Email</a>
      <a href="https://github.com/kevit03" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/kevin-tang1/" target="_blank">LinkedIn</a>
    </div>
  </div>
</section>

</main>

<script src="./app.js" defer></script>

<script>
document.querySelectorAll(".nav-link").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-link").forEach(b =>
      b.classList.toggle("is-active", b === btn)
    );
    document.querySelectorAll(".tab-panel").forEach(panel =>
      panel.classList.toggle("is-active", panel.id === btn.dataset.tab)
    );
  });
});
</script>

</body>
</html>
