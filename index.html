<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Playful single-page portfolio for a software and engineering professional."
  />
  <meta name="theme-color" content="#fff7ed" />
  <title>Kevin Tang</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: "#fff7ed",
            ink: "#171717",
            coral: "#ff7a59",
            sun: "#ffd166",
            mint: "#68d391",
            sky: "#70a5ff",
            lilac: "#b69cff"
          },
          fontFamily: {
            display: ["Bricolage Grotesque", "sans-serif"],
            mono: ["Space Mono", "monospace"]
          },
          boxShadow: {
            floaty: "0 20px 55px rgba(23, 23, 23, 0.14)"
          }
        }
      }
    };
  </script>
</head>

<body class="bg-paper text-ink antialiased">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
